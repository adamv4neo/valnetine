<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Valentine Polaroid</title>
  <link href="https://fonts.googleapis.com/css2?family=Caveat:wght@400;700&family=Dancing+Script:wght@600&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --rose: #e8416f;
      --blush: #fde0ea;
      --cream: #fff9f5;
      --warm: #f7c5d0;
      --dark: #3a1a24;
    }

    body {
      min-height: 100vh;
      background-color: var(--blush);
      background-image:
        radial-gradient(circle at 20% 30%, #fbb6ce55 0%, transparent 40%),
        radial-gradient(circle at 80% 70%, #f9a8d455 0%, transparent 40%),
        url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='%23e8416f' fill-opacity='0.06'%3E%3Cpath d='M30 10 C20 0 5 5 5 18 C5 28 30 42 30 42 C30 42 55 28 55 18 C55 5 40 0 30 10Z'/%3E%3C/g%3E%3C/svg%3E");
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      font-family: 'Caveat', cursive;
      overflow: hidden;
      position: relative;
    }

    /* Floating hearts */
    .hearts {
      position: fixed;
      inset: 0;
      pointer-events: none;
      z-index: 0;
    }
    .heart {
      position: absolute;
      font-size: 1.2rem;
      animation: floatUp linear infinite;
      opacity: 0;
    }
    @keyframes floatUp {
      0%   { opacity: 0; transform: translateY(100vh) scale(0.5) rotate(-10deg); }
      10%  { opacity: 0.8; }
      90%  { opacity: 0.6; }
      100% { opacity: 0; transform: translateY(-10vh) scale(1.1) rotate(10deg); }
    }

    /* Polaroid wrapper */
    .scene {
      perspective: 800px;
      z-index: 1;
    }

    .polaroid {
      background: #fff;
      padding: 18px 18px 60px 18px;
      box-shadow:
        0 4px 6px #e8416f22,
        0 20px 60px #e8416f33,
        0 0 0 1px #f9c8d5;
      border-radius: 3px;
      position: relative;
      cursor: pointer;
      transform: rotate(-3deg);
      transform-style: preserve-3d;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      animation: gentleSway 4s ease-in-out infinite;
      width: 280px;
    }
    @keyframes gentleSway {
      0%, 100% { transform: rotate(-3deg) translateY(0); }
      50%       { transform: rotate(-2deg) translateY(-6px); }
    }
    .polaroid:hover {
      animation: none;
      box-shadow:
        0 8px 12px #e8416f33,
        0 30px 80px #e8416f44,
        0 0 0 2px var(--rose);
    }

    /* Photo area */
    .photo-frame {
      width: 100%;
      aspect-ratio: 1;
      background: linear-gradient(135deg, var(--warm) 0%, #f9d2de 50%, #fce4ec 100%);
      position: relative;
      overflow: hidden;
      border-radius: 1px;
    }
    .photo-frame img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      display: block;
      transition: transform 0.4s ease;
    }
    .polaroid:hover .photo-frame img {
      transform: scale(1.04);
    }

    /* Placeholder if no image */
    .photo-placeholder {
      width: 100%;
      height: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 10px;
      color: var(--rose);
      font-size: 1.1rem;
    }
    .photo-placeholder .heart-icon {
      font-size: 4rem;
      animation: pulse 1.6s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); }
      50%       { transform: scale(1.12); }
    }

    /* Film grain overlay */
    .photo-frame::after {
      content: '';
      position: absolute;
      inset: 0;
      background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3CfeColorMatrix type='saturate' values='0'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='0.08'/%3E%3C/svg%3E");
      pointer-events: none;
      mix-blend-mode: multiply;
    }

    /* Caption */
    .caption {
      text-align: center;
      margin-top: 4px;
      color: var(--dark);
      font-family: 'Caveat', cursive;
      font-size: 1.4rem;
      letter-spacing: 1px;
      line-height: 1.3;
    }
    .caption .date {
      display: block;
      font-size: 0.95rem;
      color: #b06070;
      margin-top: 2px;
    }

    /* Tape pieces */
    .tape {
      position: absolute;
      width: 60px;
      height: 22px;
      background: rgba(255,200,210,0.55);
      border-left: 1px solid rgba(255,150,170,0.3);
      border-right: 1px solid rgba(255,150,170,0.3);
      backdrop-filter: blur(1px);
    }
    .tape-top {
      top: -10px;
      left: 50%;
      transform: translateX(-50%) rotate(-1deg);
    }

    /* Sticker hearts */
    .sticker {
      position: absolute;
      font-size: 1.3rem;
      animation: stickPop 0.3s ease backwards;
      pointer-events: none;
    }
    @keyframes stickPop {
      from { transform: scale(0) rotate(-20deg); }
      to   { transform: scale(1) rotate(0deg); }
    }
    .sticker-1 { top: -14px; right: -14px; animation-delay: 0.5s; }
    .sticker-2 { bottom: 50px; right: -16px; font-size: 1rem; animation-delay: 0.7s; }

    /* Button */
    .btn-next {
      margin-top: 32px;
      z-index: 1;
      position: relative;
      display: inline-flex;
      align-items: center;
      gap: 10px;
      background: var(--rose);
      color: #fff;
      font-family: 'Dancing Script', cursive;
      font-size: 1.4rem;
      font-weight: 600;
      padding: 14px 36px;
      border: none;
      border-radius: 50px;
      cursor: pointer;
      box-shadow: 0 6px 24px #e8416f55, 0 2px 0 #b03050;
      text-decoration: none;
      transition: transform 0.15s, box-shadow 0.15s, background 0.15s;
      letter-spacing: 0.5px;
    }
    .btn-next:hover {
      background: #d03060;
      transform: translateY(-3px) scale(1.04);
      box-shadow: 0 12px 32px #e8416f66, 0 2px 0 #8a2040;
    }
    .btn-next:active {
      transform: translateY(0) scale(0.98);
    }
    .btn-next .arrow {
      font-size: 1.1rem;
      transition: transform 0.2s;
    }
    .btn-next:hover .arrow {
      transform: translateX(4px);
    }

    /* Title */
    .title {
      font-family: 'Dancing Script', cursive;
      font-size: 2.2rem;
      color: var(--rose);
      text-align: center;
      margin-bottom: 24px;
      z-index: 1;
      position: relative;
      text-shadow: 0 2px 8px #e8416f33;
      animation: fadeDown 0.8s ease both;
    }
    @keyframes fadeDown {
      from { opacity: 0; transform: translateY(-20px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .scene { animation: fadeUp 0.8s ease 0.2s both; }
    .btn-next { animation: fadeUp 0.8s ease 0.5s both; }
    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(20px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- Floating hearts background -->
  <div class="hearts" id="hearts"></div>

  <p class="title">💌 Happy Valentine's Day 💌</p>

  <div class="scene">
    <div class="polaroid" id="polaroid">
      <div class="tape tape-top"></div>
      <span class="sticker sticker-1">💗</span>
      <span class="sticker sticker-2">✨</span>

      <div class="photo-frame">
        <!--
          Ganti src di bawah dengan URL foto kamu.
          Contoh: src="foto.jpg"
        -->
        <img
          src="https://via.placeholder.com/400x400/fde0ea/e8416f?text=📷+Your+Photo"
          alt="Valentine Photo"
          onerror="this.style.display='none'; document.getElementById('ph').style.display='flex';"
        />
        <div class="photo-placeholder" id="ph" style="display:none;">
          <span class="heart-icon">❤️</span>
          <span>Tambahkan fotomu di sini</span>
        </div>
      </div>

      <div class="caption">
        dengan sepenuh hati
        <span class="date">14 Februari 2025</span>
      </div>
    </div>
  </div>

  <a class="btn-next" href="page1.html">
    Buka Pesan <span class="arrow">→</span>
  </a>

  <script>
    // Floating hearts
    const heartsEl = document.getElementById('hearts');
    const symbols = ['❤️','💕','💖','💗','💓','🌹','💝','✨'];
    for (let i = 0; i < 18; i++) {
      const h = document.createElement('span');
      h.className = 'heart';
      h.textContent = symbols[Math.floor(Math.random() * symbols.length)];
      h.style.left = Math.random() * 100 + 'vw';
      h.style.fontSize = (0.8 + Math.random() * 1.2) + 'rem';
      h.style.animationDuration = (6 + Math.random() * 10) + 's';
      h.style.animationDelay = (Math.random() * 10) + 's';
      heartsEl.appendChild(h);
    }

    // 3D tilt on mouse move
    const polaroid = document.getElementById('polaroid');
    document.addEventListener('mousemove', e => {
      const cx = window.innerWidth / 2;
      const cy = window.innerHeight / 2;
      const dx = (e.clientX - cx) / cx;
      const dy = (e.clientY - cy) / cy;
      polaroid.style.transform = `rotate(-3deg) rotateY(${dx * 8}deg) rotateX(${-dy * 8}deg)`;
    });
    document.addEventListener('mouseleave', () => {
      polaroid.style.transform = '';
    });
  </script>
</body>
</html>
